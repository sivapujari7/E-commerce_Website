<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Categories</title>

  <link rel="stylesheet"
    href="style.css">

</head>
<body>

  <section class="category-banner">

  <img
    src="images/shop-banner.jpg"
    alt="Shopping Banner">

</section>

  <section class="products">

    <h2>Shop By Category</h2>

    <div class="product-container">

      <div class="product-card"
        onclick="openCategory('Shoes')">

        <img src="images/shoe.jpg">

        <h3>Shoes</h3>

      </div>

      <div class="product-card"
        onclick="openCategory('Watches')">

        <img src="images/watch.jpg">

        <h3>Watches</h3>

      </div>

      <div class="product-card"
        onclick="openCategory('Electronics')">

        <img src="images/headphone.jpg">

        <h3>Electronics</h3>

      </div>

      <div class="product-card"
        onclick="openCategory('Fashion')">

        <img src="images/fashion.jpg">

        <h3>Fashion</h3>

      </div>

    </div>

  </section>

  <script>

    function openCategory(category){

      localStorage.setItem(
        "selectedCategory",
        category
      );

      window.location.href =
        "category.html";

    }

  </script>

</body>
</html>
