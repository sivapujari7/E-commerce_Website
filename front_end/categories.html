<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Categories</title>

  <link
    rel="stylesheet"
    href="style.css">

</head>

<body>

<section class="subcategory-page">

  <h1 class="products-title">

    Shop By Categories 😄🔥

  </h1>

  <div class="subcategory-container">

    <div
      class="subcategory-card"
      onclick="openCategory('Fashion')">

      <img src="images/fashion.jpg">

      <h2>Fashion</h2>

    </div>

    <div
      class="subcategory-card"
      onclick="openCategory('Shoes')">

      <img src="images/shoe.avif">

      <h2>Shoes</h2>

    </div>

    <div
      class="subcategory-card"
      onclick="openCategory('Electronics')">

      <img src="images/headphone.jpg">

      <h2>Electronics</h2>

    </div>

    <div
      class="subcategory-card"
      onclick="openCategory('Watches')">

      <img src="images/watches.avif">

      <h2>Watches</h2>

    </div>

  </div>

</section>

<script>

function openCategory(category){

  localStorage.setItem(
    "selectedCategory",
    category
  );

  window.location.href =
    "subcategory.html";

}

</script>

</body>

</html>
